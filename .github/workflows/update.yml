name: 福彩3D五五分解-云端全自动更新

on:
  schedule:
    # 北京 22:00 (UTC 14:00)
    - cron: '0 14 * * *'
    # 北京 23:30 (UTC 15:30)
    - cron: '30 15 * * *'
    # 北京 01:00 (UTC 17:00)
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 更新开奖数据（三重备用源降级）
      run: python update_data.py
    
    - name: 运行预测分析
      run: python analyze.py
    
    - name: 生成预测网页
      run: python gen_html.py
    
    - name: 提交更新
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add fc3d-history.csv analysis_result.json index.html 五五分解预测系统.html
        git diff --cached --quiet || git commit -m "🤖 自动更新 $(date +%Y%m%d) [$(TZ='Asia/Shanghai' date +%H:%M)]"
        git push
